<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zavix | Smart Expense & Income Tracker</title>
    <style>
        :root {
            --primary-color: #2563eb; /* Modern Blue */
            --text-dark: #1f2937;
            --text-light: #6b7280;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .hero {
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(135deg, #f3f4f6 0%, #ffffff 100%);
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        .hero p {
            font-size: 1.25rem;
            color: var(--text-light);
            max-width: 600px;
            margin: 0 auto 30px auto;
        }
        .cta-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        .btn-secondary {
            background-color: #e5e7eb;
            color: var(--text-dark);
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        footer {
            margin-top: auto;
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid #eee;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        footer a {
            color: var(--primary-color);
            text-decoration: none;
            margin: 0 10px;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Zavix</h1>
        <p>Master your money with the ultimate expense and income tracker. Built for speed, security, and total financial clarity.</p>
        
        <div class="cta-buttons">
            <a href="#" class="btn btn-primary">Coming Soon to Android & iOS</a>
            <a href="mailto:support@zavixapp.com" class="btn btn-secondary">Contact Support</a>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Zavix App. All rights reserved.</p>
        <div class="legal-links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms & Conditions</a>
        </div>
    </footer>

</body>
</html>
